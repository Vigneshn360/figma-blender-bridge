<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    :root { font: 12px Inter, system-ui, sans-serif; color-scheme: light dark; }
    * { box-sizing: border-box; }
    body { margin: 0; padding: 16px; background: var(--figma-color-bg); color: var(--figma-color-text); }
    .heading { display: flex; align-items: baseline; justify-content: space-between; gap: 12px; }
    h1 { margin: 0 0 6px; font-size: 18px; }
    .version { color: var(--figma-color-text-secondary); font-size: 11px; }
    .sub { margin: 0 0 16px; color: var(--figma-color-text-secondary); line-height: 1.4; }
    .status { min-height: 58px; padding: 11px; border-radius: 8px; background: var(--figma-color-bg-secondary); margin-bottom: 14px; }
    .status strong { display: block; margin-bottom: 4px; }
    .details { color: var(--figma-color-text-secondary); overflow-wrap: anywhere; }
    label { display: flex; gap: 8px; align-items: center; margin: 12px 0; }
    .actions { display: flex; gap: 8px; margin-top: 16px; }
    .update { display: flex; align-items: center; gap: 8px; margin-top: 12px; padding-top: 12px; border-top: 1px solid var(--figma-color-border); }
    .update span { flex: 1; color: var(--figma-color-text-secondary); line-height: 1.3; }
    button { border: 0; border-radius: 6px; padding: 10px 13px; cursor: pointer; font-weight: 600; }
    .primary { flex: 1; color: white; background: #0d99ff; }
    .secondary { color: var(--figma-color-text); background: var(--figma-color-bg-tertiary); }
    button:disabled { opacity: .55; cursor: default; }
  </style>
</head>
<body>
  <div class="heading"><h1>Push to Blender</h1><span class="version">v0.6.3</span></div>
  <p class="sub">Send selected layers with their frame and group hierarchy to Blender.</p>
  <div class="status" id="status"><strong>Checking Blender…</strong><span class="details"></span></div>
  <label><input id="outlineText" type="checkbox" checked> Outline text for visual accuracy</label>
  <div class="actions">
    <button class="secondary" id="check">Check</button>
    <button class="primary" id="push">Push selection</button>
  </div>
  <div class="update">
    <span id="updateStatus">Updates not checked</span>
    <button class="secondary" id="checkUpdate">Check</button>
    <button class="primary" id="downloadUpdate" hidden>Download update</button>
  </div>
  <script>
    const status = document.getElementById("status");
    const push = document.getElementById("push");
    const updateStatus = document.getElementById("updateStatus");
    const downloadUpdate = document.getElementById("downloadUpdate");
    function send(pluginMessage) { parent.postMessage({ pluginMessage }, "*"); }
    document.getElementById("check").onclick = () => send({ type: "check" });
    push.onclick = () => send({ type: "push", options: { outlineText: document.getElementById("outlineText").checked } });
    document.getElementById("checkUpdate").onclick = () => send({ type: "check-update" });
    downloadUpdate.onclick = () => send({ type: "download-update" });
    onmessage = (event) => {
      const msg = event.data.pluginMessage;
      if (!msg) return;
      if (msg.type === "update-status") {
        updateStatus.textContent = msg.message;
        downloadUpdate.hidden = !msg.available;
        if (msg.available) downloadUpdate.textContent = `Download ${msg.version}`;
        return;
      }
      status.innerHTML = `<strong>${escapeHtml(msg.message)}</strong><span class="details">${escapeHtml(msg.details || "")}</span>`;
      push.disabled = msg.type === "working";
    };
    function escapeHtml(value) {
      const div = document.createElement("div"); div.textContent = value; return div.innerHTML;
    }
  </script>
</body>
</html>
